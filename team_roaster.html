<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Work Roster — Team Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --canvas: #E9EBF0;
    --surface: #FFFFFF;
    --surface-2: #F4F5F8;
    --ink: #14161C;
    --ink-2: #4A4E59;
    --ink-3: #888D9A;
    --line: #DDE0E7;
    --line-2: #EAECF1;
    --brass: #B0822F;
    --brass-soft: #F5ECD8;

    --p-high:   #C0392B;
    --p-med:    #C9892E;
    --p-low:    #6B7280;

    --radius: 14px;
    --radius-sm: 9px;
    --shadow: 0 1px 2px rgba(20,22,28,.05), 0 8px 24px -12px rgba(20,22,28,.18);
    --shadow-lg: 0 24px 60px -22px rgba(20,22,28,.40);
  }

  html[data-theme="dark"] {
    --canvas: #14161C;
    --surface: #1C1F27;
    --surface-2: #23262F;
    --ink: #ECEEF3;
    --ink-2: #B4B9C6;
    --ink-3: #7E8493;
    --line: #2E323D;
    --line-2: #272A33;
    --brass: #CFA24D;
    --brass-soft: #3A331E;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px -12px rgba(0,0,0,.6);
    --shadow-lg: 0 24px 60px -22px rgba(0,0,0,.8);
  }
  /* dark-mode: elements that use --ink as a solid background need an accent instead */
  html[data-theme="dark"] .btn.primary { background: var(--brass); border-color: var(--brass); color: #14161C; }
  html[data-theme="dark"] .btn.primary:hover { background: #DDB05E; }
  html[data-theme="dark"] .vchip.active { background: var(--brass); border-color: var(--brass); color: #14161C; }
  html[data-theme="dark"] .vchip.active .vcount { background: rgba(0,0,0,.22); color: #14161C; }
  html[data-theme="dark"] .identity .idwrap.adminMode { background: var(--brass); border-color: var(--brass); }
  html[data-theme="dark"] .identity .idwrap.adminMode select { color: #14161C; }
  html[data-theme="dark"] .badge.admin { color: #14161C; }
  html[data-theme="dark"] .badge.emp { background: #3A3F4B; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--canvas);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.45;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 14px; }

  .app { max-width: 1240px; margin: 0 auto; padding: 22px 22px 80px; }

  /* ---------- Top bar ---------- */
  .topbar { display: flex; align-items: center; gap: 18px; padding: 4px 2px 20px; }
  .brand { display: flex; align-items: center; gap: 13px; }
  .crest {
    width: 42px; height: 42px; border-radius: 11px; flex: 0 0 auto;
    background: linear-gradient(150deg, #1c1e26 0%, #2a2d38 100%);
    display: grid; place-items: center;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 6px 16px -8px rgba(0,0,0,.5);
  }
  .crest span { font-family: "Fraunces", serif; font-weight: 600; font-size: 21px; color: var(--brass); line-height: 1; }
  .brand h1 { font-family: "Fraunces", serif; font-weight: 600; font-size: 19px; letter-spacing: -.01em; margin: 0; line-height: 1.1; }
  .brand p { margin: 1px 0 0; font-size: 11.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
  .topbar .spacer { flex: 1; }

  .ventureFilter { display: flex; gap: 6px; flex-wrap: wrap; }
  .vchip {
    border: 1px solid var(--line); background: var(--surface); color: var(--ink-2);
    border-radius: 999px; padding: 6px 12px; font-size: 12.5px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 7px; transition: .14s;
  }
  .vchip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .vchip:hover { border-color: var(--ink-3); }
  .vchip.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  .identity { display: flex; align-items: center; gap: 9px; }
  .identity .lbl { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }
  .identity .idwrap {
    display: flex; align-items: center; gap: 9px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 999px; padding: 4px 4px 4px 6px;
  }
  .identity .idwrap.adminMode { background: var(--ink); border-color: var(--ink); }
  .identity .idwrap.adminMode select { color: #fff; }
  .identity select { border: none; background: none; font-weight: 600; font-size: 13px; color: var(--ink); outline: none; padding: 4px 4px; max-width: 190px; }
  .identity .badge { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #fff; padding: 3px 9px; border-radius: 999px; }
  .identity .badge.admin { background: var(--brass); }
  .identity .badge.emp { background: var(--ink); }

  /* ---------- Tabs ---------- */
  .tabs { display: flex; gap: 4px; margin: 6px 0 20px; border-bottom: 1px solid var(--line); }
  .tab {
    background: none; border: none; padding: 11px 16px 13px;
    font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 14.5px;
    color: var(--ink-3); position: relative; letter-spacing: -.005em;
  }
  .tab .count { font-size: 11px; background: var(--line-2); color: var(--ink-2); border-radius: 6px; padding: 1px 6px; margin-left: 7px; font-weight: 600; }
  .tab:hover { color: var(--ink-2); }
  .tab.active { color: var(--ink); }
  .tab.active::after { content: ""; position: absolute; left: 14px; right: 14px; bottom: -1px; height: 2px; background: var(--brass); border-radius: 2px; }

  /* ---------- Stat strip ---------- */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
  .stat .label { font-size: 11.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }
  .stat .num { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 28px; margin-top: 6px; letter-spacing: -.02em; }

  /* ---------- Board ---------- */
  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: start; }
  .col { background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; min-height: 120px; }
  .col.dragover { outline: 2px dashed var(--brass); outline-offset: -4px; background: var(--brass-soft); }
  .col-head { display: flex; align-items: center; gap: 9px; padding: 2px 4px 12px; }
  .col-head .ch-dot { width: 9px; height: 9px; border-radius: 50%; }
  .col-head h3 { font-family: "Space Grotesk", sans-serif; font-size: 13px; font-weight: 600; margin: 0; letter-spacing: .02em; text-transform: uppercase; color: var(--ink-2); }
  .col-head .ch-count { margin-left: auto; font-size: 12px; color: var(--ink-3); font-weight: 600; }

  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-sm);
    padding: 12px 13px 12px 16px; margin-bottom: 10px; position: relative; cursor: grab;
    box-shadow: 0 1px 2px rgba(20,22,28,.04); transition: box-shadow .14s, transform .14s;
  }
  .card:hover { box-shadow: var(--shadow); }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: .45; }
  .card .spine { position: absolute; left: 0; top: 8px; bottom: 8px; width: 4px; border-radius: 4px; }
  .card .ttl { font-weight: 600; font-size: 14px; color: var(--ink); margin-bottom: 9px; padding-right: 18px; line-height: 1.35; }
  .card .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .vpill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; color: #fff; letter-spacing: .01em; }
  .prio { font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; color: var(--ink-2); }
  .prio .pdot { width: 7px; height: 7px; border-radius: 2px; }
  .card .who { display: flex; align-items: center; gap: 7px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line-2); }
  .avatar { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-size: 10.5px; font-weight: 700; flex: 0 0 auto; font-family: "Space Grotesk", sans-serif; }
  .who .nm { font-size: 12.5px; color: var(--ink-2); font-weight: 500; }
  .who .due { margin-left: auto; font-size: 11.5px; color: var(--ink-3); }
  .who .due.over { color: var(--p-high); font-weight: 600; }
  .card .del { position: absolute; top: 9px; right: 10px; border: none; background: none; color: var(--ink-3); font-size: 15px; line-height: 1; padding: 2px; opacity: 0; transition: .14s; border-radius: 5px; }
  .card:hover .del { opacity: 1; }
  .card .del:hover { color: var(--p-high); background: var(--line-2); }

  /* employee quick-move buttons */
  .movebar { display: flex; gap: 6px; margin-top: 11px; }
  .movebtn { flex: 1; border: 1px solid var(--line); background: var(--surface-2); color: var(--ink-2); border-radius: 7px; padding: 6px 8px; font-size: 11.5px; font-weight: 600; transition: .14s; }
  .movebtn:hover { border-color: var(--ink-3); color: var(--ink); }
  .movebtn.go { background: var(--brass-soft); border-color: #E7D4A6; color: var(--brass); }
  .movebtn.done { background: rgba(46,158,120,.12); border-color: rgba(46,158,120,.3); color: #2E9E78; }

  .col-empty { text-align: center; color: var(--ink-3); font-size: 12.5px; padding: 18px 8px; }

  /* ---------- Team grid ---------- */
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .person { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .person .phead { display: flex; align-items: center; gap: 11px; }
  .person .av-lg { width: 40px; height: 40px; border-radius: 11px; font-size: 15px; }
  .person .pname { font-weight: 600; font-size: 15px; }
  .person .prole { font-size: 12.5px; color: var(--ink-3); margin-top: 1px; }
  .person .pdel { margin-left: auto; border: none; background: none; color: var(--ink-3); font-size: 16px; padding: 3px; border-radius: 6px; }
  .person .pdel:hover { color: var(--p-high); background: var(--line-2); }
  .person .pventure { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-2); margin-top: 13px; font-weight: 500; }
  .person .pventure .dot { width: 8px; height: 8px; border-radius: 50%; }
  .loadwrap { margin-top: 14px; }
  .loadwrap .lrow { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-2); margin-bottom: 6px; }
  .loadwrap .lrow b { font-family: "Space Grotesk", sans-serif; color: var(--ink); }
  .bar { height: 7px; background: var(--line-2); border-radius: 999px; overflow: hidden; }
  .bar > span { display: block; height: 100%; border-radius: 999px; transition: width .3s; }
  .availrow { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
  .toggle button { border: none; background: var(--surface); padding: 5px 11px; font-size: 12px; font-weight: 500; color: var(--ink-3); }
  .toggle button.on { color: #fff; }
  .toggle button.on.av { background: #2E9E78; }
  .toggle button.on.bz { background: var(--p-med); }
  .toggle button.on.of { background: var(--ink-3); }

  /* ---------- Roster ---------- */
  .roster-wrap { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow-x: auto; }
  table.roster { border-collapse: collapse; width: 100%; min-width: 720px; }
  table.roster th, table.roster td { border-bottom: 1px solid var(--line-2); padding: 0; text-align: center; }
  table.roster thead th { font-size: 11.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; padding: 13px 8px; background: var(--surface-2); }
  table.roster thead th:first-child, table.roster td.pcell { text-align: left; }
  table.roster td.pcell { padding: 11px 14px; }
  .pcell .pc-in { display: flex; align-items: center; gap: 9px; }
  .pcell .nm { font-weight: 600; font-size: 13.5px; }
  .pcell .rl { font-size: 11.5px; color: var(--ink-3); }
  .shift { width: 100%; height: 100%; min-height: 44px; border: none; background: none; font-size: 12px; font-weight: 600; letter-spacing: .03em; }
  .shift.work { background: rgba(46,158,120,.12); color: #2E9E78; }
  .shift.off  { background: var(--surface-2); color: var(--ink-3); }
  .shift.leave{ background: rgba(192,57,43,.10); color: var(--p-high); }
  .shift.ro { cursor: default; }
  .roster-legend { display: flex; gap: 18px; padding: 13px 16px; font-size: 12px; color: var(--ink-2); border-top: 1px solid var(--line-2); }
  .roster-legend span { display: inline-flex; align-items: center; gap: 7px; }
  .lg { width: 12px; height: 12px; border-radius: 4px; }

  /* ---------- Buttons ---------- */
  .btn { border: 1px solid var(--line); background: var(--surface); color: var(--ink); border-radius: 9px; padding: 8px 14px; font-weight: 500; font-size: 13.5px; display: inline-flex; align-items: center; gap: 7px; transition: .14s; }
  .btn:hover { border-color: var(--ink-3); }
  .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.primary:hover { background: #000; }
  .btn .plus { font-size: 16px; line-height: 1; margin-top: -1px; }

  .section-head { display: flex; align-items: center; margin-bottom: 16px; }
  .section-head h2 { font-family: "Space Grotesk", sans-serif; font-size: 16px; font-weight: 600; margin: 0; letter-spacing: -.01em; }
  .section-head .sub { font-size: 12.5px; color: var(--ink-3); margin-left: 12px; }
  .section-head .spacer { flex: 1; }

  /* ---------- Modal ---------- */
  .overlay { position: fixed; inset: 0; background: rgba(20,22,28,.42); backdrop-filter: blur(2px); display: grid; place-items: center; z-index: 50; padding: 20px; }
  .modal { background: var(--surface); border-radius: 16px; box-shadow: var(--shadow-lg); width: 100%; max-width: 440px; padding: 22px; }
  .modal h3 { font-family: "Space Grotesk", sans-serif; font-size: 17px; margin: 0 0 18px; font-weight: 600; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; letter-spacing: .02em; }
  .field input, .field select { width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; background: var(--surface-2); color: var(--ink); outline: none; transition: .14s; }
  .field input:focus, .field select:focus { border-color: var(--brass); background: var(--surface); box-shadow: 0 0 0 3px var(--brass-soft); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

  .empty-block { text-align: center; padding: 50px 20px; color: var(--ink-3); }
  .empty-block .eb-ic { font-size: 30px; margin-bottom: 8px; opacity: .5; }

  /* venture chip counts */
  .vchip .vcount { font-size: 11px; font-weight: 700; background: var(--line-2); color: var(--ink-2); border-radius: 999px; padding: 0 6px; min-width: 17px; text-align: center; }
  .vchip.active .vcount { background: rgba(255,255,255,.22); color: #fff; }

  /* person edit/remove actions */
  .pactions { display: flex; gap: 8px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line-2); }
  .pbtn { flex: 1; border: 1px solid var(--line); background: var(--surface-2); color: var(--ink-2); border-radius: 8px; padding: 7px 10px; font-size: 12.5px; font-weight: 600; transition: .14s; }
  .pbtn:hover { border-color: var(--ink-3); color: var(--ink); }
  .pbtn.danger:hover { border-color: var(--p-high); color: var(--p-high); background: rgba(192,57,43,.06); }

  /* board toolbar */
  .boardtools { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .bt-search { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--line); border-radius: 9px; padding: 7px 11px; min-width: 220px; flex: 1 1 220px; max-width: 360px; }
  .bt-search svg { color: var(--ink-3); flex: 0 0 auto; }
  .bt-search input { border: none; background: none; outline: none; width: 100%; font-size: 13.5px; color: var(--ink); }
  .bt-select { border: 1px solid var(--line); background: var(--surface); border-radius: 9px; padding: 8px 11px; color: var(--ink); outline: none; font-weight: 500; font-size: 13px; }
  .bt-toggle { border: 1px solid var(--line); background: var(--surface); border-radius: 9px; padding: 8px 13px; font-size: 13px; font-weight: 600; color: var(--ink-2); transition: .14s; }
  .bt-toggle:hover { border-color: var(--ink-3); }
  .bt-toggle.on { background: rgba(192,57,43,.08); border-color: rgba(192,57,43,.4); color: var(--p-high); }
  .bt-clear { font-size: 13px; color: var(--ink-3); font-weight: 600; cursor: pointer; padding: 6px; }
  .bt-clear:hover { color: var(--ink); }

  /* task note on card */
  .card .note { font-size: 12px; color: var(--ink-3); margin: -2px 0 9px; line-height: 1.4; padding-right: 16px; }

  /* roster: today column highlight */
  table.roster th.today { color: var(--brass); position: relative; }
  table.roster th.today::after { content: ""; position: absolute; left: 16%; right: 16%; bottom: 6px; height: 2px; background: var(--brass); border-radius: 2px; }
  table.roster td.today { box-shadow: inset 0 0 0 1.5px var(--brass-soft); }

  @media (max-width: 820px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .board { grid-template-columns: 1fr; }
    .topbar { flex-wrap: wrap; }
    .ventureFilter { order: 3; width: 100%; }
  }
  /* ---------- Theme toggle ---------- */
  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--surface); color: var(--ink-2); display: grid; place-items: center;
    transition: .14s; flex: 0 0 auto;
  }
  .icon-btn:hover { border-color: var(--ink-3); color: var(--ink); }

  /* ---------- Toasts ---------- */
  .toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 10px; z-index: 80; align-items: center; }
  .toast {
    background: var(--ink); color: #fff; border-radius: 11px; padding: 11px 14px;
    box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 14px;
    font-size: 13.5px; font-weight: 500; min-width: 260px; max-width: 92vw;
    animation: toastIn .22s cubic-bezier(.2,.8,.3,1);
  }
  html[data-theme="dark"] .toast { background: #2C303B; box-shadow: var(--shadow-lg), inset 0 0 0 1px var(--line); }
  .toast.leaving { animation: toastOut .2s ease forwards; }
  .toast .t-msg { flex: 1; }
  .toast .t-act { background: none; border: none; color: var(--brass); font-weight: 700;
    font-size: 13px; padding: 2px 4px; letter-spacing: .02em; }
  .toast .t-act:hover { text-decoration: underline; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateY(12px); } }

  /* ---------- Subtasks (modal + card) ---------- */
  .subwrap { display: flex; flex-direction: column; gap: 7px; }
  .subrow { display: flex; align-items: center; gap: 9px; }
  .subrow input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--brass); flex: 0 0 auto; cursor: pointer; }
  .subrow input[type="text"] { flex: 1; }
  .subrow .sub-del { border: none; background: none; color: var(--ink-3); font-size: 17px; line-height: 1; padding: 4px 6px; border-radius: 6px; }
  .subrow .sub-del:hover { color: var(--p-high); background: var(--line-2); }
  .sub-add { border: 1px dashed var(--line); background: var(--surface-2); color: var(--ink-2);
    border-radius: 8px; padding: 8px; font-size: 12.5px; font-weight: 600; margin-top: 2px; }
  .sub-add:hover { border-color: var(--ink-3); color: var(--ink); }
  .card .subprog { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--ink-3); font-weight: 600; margin-top: 9px; }
  .card .subprog .sp-bar { width: 64px; height: 5px; background: var(--line-2); border-radius: 999px; overflow: hidden; }
  .card .subprog .sp-bar > span { display: block; height: 100%; background: #2E9E78; border-radius: 999px; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="toast-wrap" id="toastWrap"></div>

<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="crest"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#B0822F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9.5h18"/><path d="M8 2v4M16 2v4"/><path d="M7.5 14.5l2.2 2.2L14.5 12"/></svg></div>
      <div>
        <h1>Work Roster</h1>
        <p>Team Dashboard</p>
      </div>
    </div>

  <!-- BOARD -->

<script>
/* ---------------- Config ---------------- */
const VENTURES = [
  { id: "placeonix",  name: "Placeonix",     color: "#2D6A9F" },
  { id: "avsora",     name: "AVSORA",        color: "#7C5CBF" },
  { id: "clotheory",  name: "The Clotheory", color: "#C0567E" },
  { id: "ampathways", name: "AM Pathways",   color: "#2E9E78" },
];
const vMap = Object.fromEntries(VENTURES.map(v => [v.id, v]));
const COLS = [
  { id: "todo",  name: "To Do",       color: "#888D9A" },
  { id: "doing", name: "In Progress", color: "#C9892E" },
  { id: "done",  name: "Done",        color: "#2E9E78" },
];
const NEXT_STATUS = { todo: "doing", doing: "done", done: null };
const PREV_STATUS = { done: "doing", doing: "todo", todo: null };
const STATUS_LABEL = { todo: "To Do", doing: "In Progress", done: "Done" };
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const PRIO = { high: {l:"High", c:"var(--p-high)"}, med:{l:"Med",c:"var(--p-med)"}, low:{l:"Low",c:"var(--p-low)"} };
const AVA_COLORS = ["#C0567E","#2D6A9F","#7C5CBF","#2E9E78","#DB7F2E","#3A7CA5","#9C5BB8"];

/* ---------------- Seed data ---------------- */
function seed() {
  const e = [
    { id:"e1", name:"Ravi Teja",    role:"Placement Lead",       venture:"placeonix", avail:"busy" },
    { id:"e2", name:"Sneha Reddy",  role:"Telecaller / CRM",     venture:"placeonix", avail:"avail" },
    { id:"e3", name:"Karthik Nair", role:"Full-Stack Developer", venture:"avsora",    avail:"busy" },
    { id:"e4", name:"Divya Rao",    role:"Brand Designer",       venture:"avsora",    avail:"avail" },
    { id:"e5", name:"Anjali M",     role:"Master Tailor",        venture:"clotheory", avail:"busy" },
    { id:"e6", name:"Pavan Kumar",  role:"Study-Abroad Advisor", venture:"ampathways",avail:"avail" },
  ];
  const today = new Date();
  const d = (off) => { const x = new Date(today); x.setDate(x.getDate()+off); return x.toISOString().slice(0,10); };
  const t = [
    { id:"t1", title:"Convert all 21 course brochures to print-ready CMYK", assignee:"e4", venture:"placeonix", priority:"high", due:d(2),  status:"doing", notes:"Use the locked vector files, 300 DPI, bleed marks on" },
    { id:"t2", title:"Call back 40 qualified leads from college fair",       assignee:"e2", venture:"placeonix", priority:"high", due:d(0),  status:"todo" },
    { id:"t3", title:"Ship student dashboard role-based login fixes",        assignee:"e3", venture:"avsora",    priority:"med",  due:d(4),  status:"doing" },
    { id:"t4", title:"Finalise C&T monogram social asset set",               assignee:"e4", venture:"avsora",    priority:"low",  due:d(6),  status:"todo" },
    { id:"t5", title:"Deliver 3 bespoke suit fittings",                      assignee:"e5", venture:"clotheory", priority:"med",  due:d(1),  status:"doing", notes:"Kondapur studio, clients confirmed for 4pm slots" },
    { id:"t6", title:"Submit 5 UK applications on ApplyBoard",               assignee:"e6", venture:"ampathways",priority:"high", due:d(-1), status:"todo" },
    { id:"t7", title:"Set up TeleCRM follow-up cadence",                     assignee:"e1", venture:"placeonix", priority:"med",  due:d(5),  status:"done" },
    { id:"t8", title:"Draft college partnership outreach to 20 colleges",    assignee:"e2", venture:"placeonix", priority:"med",  due:d(3),  status:"todo" },
  ];
  const schedule = {};
  e.forEach((p, i) => {
    schedule[p.id] = DAYS.map((_, di) => {
      if (di === 6) return "off";
      if (di === 5 && i % 2 === 0) return "off";
      return "work";
    });
  });
  return { employees: e, tasks: t, schedule };
}

/* ---------------- State + persistence ---------------- */
let state = null;
let filter = "all";
let currentUser = "admin";      // "admin" or an employee id
let activeTab = "board";
let editingTaskId = null;
let editingPersonId = null;
let searchQ = "";
let assigneeFilter = "all";
let overdueOnly = false;
let sortBy = "manual";
let theme = "light";

const role = () => currentUser === "admin" ? "admin" : "employee";

/* ---------------- Theme ---------------- */
function applyTheme(){
  document.documentElement.setAttribute("data-theme", theme);
  const btn = $("themeToggle");
  if (btn) btn.innerHTML = theme==="dark"
    ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg>`
    : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>`;
}
function toggleTheme(){
  theme = theme==="dark" ? "light" : "dark";
  try { localStorage.setItem("roster:theme", theme); } catch (_) {}
  applyTheme();
}

/* ---------------- Toasts ---------------- */
function toast(msg, opts={}){
  const el = document.createElement("div");
  el.className = "toast";
  el.innerHTML = `<span class="t-msg">${esc(msg)}</span>` +
    (opts.actionLabel ? `<button class="t-act">${esc(opts.actionLabel)}</button>` : "");
  $("toastWrap").appendChild(el);
  let removed = false;
  const remove = ()=>{ if(removed) return; removed=true; el.classList.add("leaving"); setTimeout(()=>el.remove(), 200); };
  if (opts.actionLabel && opts.onAction){
    el.querySelector(".t-act").addEventListener("click", ()=>{ opts.onAction(); remove(); });
  }
  setTimeout(remove, opts.duration || 4500);
}

/* ---------------- CSV export ---------------- */
function downloadCSV(filename, rows){
  const csv = rows.map(r => r.map(cell => {
    const s = (cell==null ? "" : String(cell));
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(",")).join("\r\n");
  const blob = new Blob(["﻿"+csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function exportTasksCSV(){
  const ts = boardTasks();
  const rows = [["Title","Venture","Assignee","Priority","Due","Status","Checklist","Notes"]];
  ts.forEach(t=>{
    const p = personById(t.assignee); const subs = t.subtasks||[];
    rows.push([ t.title, vMap[t.venture]?.name||"", p?p.name:"Unassigned", PRIO[t.priority].l,
      t.due||"", STATUS_LABEL[t.status], subs.length?`${subs.filter(s=>s.done).length}/${subs.length}`:"", t.notes||"" ]);
  });
  downloadCSV("tasks.csv", rows);
  toast(`Exported ${ts.length} task(s) to tasks.csv`);
}
function exportRosterCSV(){
  const people = visiblePeople();
  const rows = [["Member","Role", ...DAYS]];
  people.forEach(p=>{
    const sch = state.schedule[p.id] || DAYS.map(()=>"work");
    rows.push([ p.name, p.role, ...sch.map(s=>SHIFT_LABEL[s]) ]);
  });
  downloadCSV("roster.csv", rows);
  toast(`Exported roster for ${people.length} member(s)`);
}

const STORE_KEY = "roster:state2";
async function load() {
  // Prefer host-provided storage when available, fall back to localStorage.
  try {
    if (window.storage && typeof window.storage.get === "function") {
      const r = await window.storage.get(STORE_KEY);
      if (r && r.value) state = JSON.parse(r.value);
    } else {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) state = JSON.parse(raw);
    }
  } catch (_) {}
  if (!state) state = seed();
}
async function save() {
  const payload = JSON.stringify(state);
  try {
    if (window.storage && typeof window.storage.set === "function") {
      await window.storage.set(STORE_KEY, payload);
    } else {
      localStorage.setItem(STORE_KEY, payload);
    }
  } catch (_) {}
}

/* ---------------- Helpers ---------------- */
const $ = (id) => document.getElementById(id);
function initials(name){ return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase(); }
function avatarColor(id){ let h=0; for(const c of id) h=(h*31+c.charCodeAt(0))>>>0; return AVA_COLORS[h%AVA_COLORS.length]; }
function fmtDue(s){ if(!s) return ""; const x=new Date(s+"T00:00:00"); return x.toLocaleDateString("en-IN",{day:"numeric",month:"short"}); }
function isOverdue(s){ if(!s) return false; return new Date(s+"T00:00:00") < new Date(new Date().toDateString()); }
function personById(id){ return state.employees.find(p=>p.id===id); }
function uid(p){ return p + Math.random().toString(36).slice(2,8); }
function esc(s){ return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function emptyBlock(t, s){ return `<div class="empty-block"><div class="eb-ic">◇</div><div style="font-weight:600;color:var(--ink-2)">${t}</div><div style="margin-top:4px">${s}</div></div>`; }

function visibleTasks(){
  if (role()==="employee") return state.tasks.filter(t=>t.assignee===currentUser);
  return state.tasks.filter(t => filter==="all" || t.venture===filter);
}
function visiblePeople(){
  if (role()==="employee") return state.employees.filter(p=>p.id===currentUser);
  return state.employees.filter(p => filter==="all" || p.venture===filter);
}
function boardTasks(){
  let ts = visibleTasks();
  if (role()==="admin"){
    if (assigneeFilter!=="all") ts = ts.filter(t=>t.assignee===assigneeFilter);
    if (overdueOnly) ts = ts.filter(t=>t.status!=="done" && isOverdue(t.due));
    const q = searchQ.trim().toLowerCase();
    if (q) ts = ts.filter(t => (t.title + " " + (t.notes||"")).toLowerCase().includes(q));
  }
  return sortTasks(ts);
}
const PRIO_RANK = { high:0, med:1, low:2 };
function sortTasks(ts){
  if (sortBy==="manual") return ts;
  const arr = ts.slice();
  if (sortBy==="priority") arr.sort((a,b)=> PRIO_RANK[a.priority]-PRIO_RANK[b.priority]);
  else if (sortBy==="due") arr.sort((a,b)=> (a.due||"9999-99-99").localeCompare(b.due||"9999-99-99"));
  else if (sortBy==="title") arr.sort((a,b)=> a.title.localeCompare(b.title));
  return arr;
}
function setSort(v){ sortBy=v; renderBoard(); }

/* ---------------- Identity ---------------- */
function renderIdentity(){
  const sel = $("identity");
  sel.innerHTML = `<option value="admin">Admin (you)</option>` +
    state.employees.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("");
  sel.value = currentUser;
  const isAdmin = role()==="admin";
  $("idwrap").classList.toggle("adminMode", isAdmin);
  const badge = $("roleBadge");
  badge.textContent = isAdmin ? "Admin" : "Staff";
  badge.className = "badge " + (isAdmin ? "admin" : "emp");
}
function setUser(v){
  currentUser = v;
  if (role()==="employee") filter = "all";
  if (activeTab==="team" && role()==="employee") activeTab="board";
  renderAll();
}

/* ---------------- Venture filter ---------------- */
function renderFilter(){
  const wrap = $("ventureFilter");
  if (role()==="employee"){ wrap.classList.add("hidden"); wrap.innerHTML=""; return; }
  wrap.classList.remove("hidden");
  const chips = [{id:"all",name:"All",color:"#14161C"}, ...VENTURES];
  const openCount = (vid) => state.tasks.filter(t => t.status!=="done" && (vid==="all" || t.venture===vid)).length;
  wrap.innerHTML = chips.map(v => {
    const n = openCount(v.id);
    return `
    <button class="vchip ${filter===v.id?'active':''}" onclick="setFilter('${v.id}')">
      <span class="dot" style="background:${v.color}"></span>${v.name}${n?`<span class="vcount">${n}</span>`:''}
    </button>`;
  }).join("");
}
function setFilter(id){ filter=id; assigneeFilter="all"; renderAll(); }

/* ---------------- Tabs ---------------- */
function renderTabs(){
  const isAdmin = role()==="admin";
  const tabs = isAdmin
    ? [["board","Work Board", visibleTasks().filter(t=>t.status!=="done").length],
       ["team","Team", visiblePeople().length],
       ["roster","Roster", null]]
    : [["board","My Work", visibleTasks().filter(t=>t.status!=="done").length],
       ["roster","My Roster", null]];
  $("tabs").innerHTML = tabs.map(([id,label,count])=>`
    <button class="tab ${activeTab===id?'active':''}" onclick="switchTab('${id}')">
      ${label}${count!==null?`<span class="count">${count}</span>`:''}
    </button>`).join("");
}
function switchTab(name){
  activeTab = name;
  ["board","team","roster"].forEach(v=>$("view-"+v).classList.toggle("hidden", v!==name));
  renderTabs();
}

/* ---------------- Chrome (role-based labels/buttons) ---------------- */
function renderChrome(){
  const isAdmin = role()==="admin";
  $("assignBtn").classList.toggle("hidden", !isAdmin);
  $("boardTitle").textContent = isAdmin ? "Work Board" : "My Work";
  $("boardSub").textContent = isAdmin
    ? "Drag a card between columns to update its status"
    : "Drag cards or use the buttons to update your progress";
  $("rosterTitle").textContent = isAdmin ? "Weekly Roster" : "My Roster";
  const todayIdx = (new Date().getDay()+6)%7;
  const workingToday = visiblePeople().filter(p => (state.schedule[p.id]||[])[todayIdx]==="work").length;
  $("rosterSub").textContent = isAdmin
    ? `Click a cell to cycle Working → Off → Leave · ${workingToday} working today`
    : "Your schedule for the week (set by admin)";
  // keep active section visible after role change
  ["board","team","roster"].forEach(v=>$("view-"+v).classList.toggle("hidden", v!==activeTab));
}

/* ---------------- Stats ---------------- */
function renderStats(){
  const ts = visibleTasks();
  const open = ts.filter(t=>t.status!=="done").length;
  const doing = ts.filter(t=>t.status==="doing").length;
  const overdue = ts.filter(t=>t.status!=="done" && isOverdue(t.due)).length;
  const isAdmin = role()==="admin";
  const fourth = isAdmin
    ? ["Team members", visiblePeople().length]
    : ["Completed", ts.filter(t=>t.status==="done").length];
  $("stats").innerHTML = [
    [isAdmin?"Open tasks":"My open tasks", open],
    ["In progress", doing],
    ["Overdue", overdue],
    fourth,
  ].map(([l,n])=>`<div class="stat"><div class="label">${l}</div><div class="num">${n}</div></div>`).join("");
}

/* ---------------- Board toolbar (admin) ---------------- */
function renderBoardTools(){
  const tools = $("boardTools");
  if (role()!=="admin"){ tools.classList.add("hidden"); return; }
  tools.classList.remove("hidden");
  const people = state.employees.filter(p => filter==="all" || p.venture===filter);
  $("assigneeFilter").innerHTML = `<option value="all">Everyone</option>` +
    people.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("");
  $("assigneeFilter").value = assigneeFilter;
  $("sortSelect").value = sortBy;
  $("taskSearch").value = searchQ;
  $("overdueToggle").classList.toggle("on", overdueOnly);
  refreshClearBtn();
}
function refreshClearBtn(){
  const active = searchQ.trim() || assigneeFilter!=="all" || overdueOnly;
  $("btClear").classList.toggle("hidden", !active);
}
function setSearch(v){ searchQ=v; renderBoard(); refreshClearBtn(); }
function setAssigneeFilter(v){ assigneeFilter=v; renderBoard(); renderBoardTools(); }
function toggleOverdue(){ overdueOnly=!overdueOnly; renderBoard(); renderBoardTools(); }
function clearBoardFilters(){ searchQ=""; assigneeFilter="all"; overdueOnly=false; renderBoard(); renderBoardTools(); }

/* ---------------- Board ---------------- */
function renderBoard(){
  const ts = boardTasks();
  const isAdmin = role()==="admin";
  $("board").innerHTML = COLS.map(col => {
    const cards = ts.filter(t=>t.status===col.id);
    return `
      <div class="col" data-col="${col.id}"
           ondragover="onDragOver(event,this)" ondragleave="this.classList.remove('dragover')"
           ondrop="onDrop(event,'${col.id}')">
        <div class="col-head">
          <span class="ch-dot" style="background:${col.color}"></span>
          <h3>${col.name}</h3><span class="ch-count">${cards.length}</span>
        </div>
        ${cards.map(t=>cardHTML(t, isAdmin)).join("") || '<div class="col-empty">Nothing here</div>'}
      </div>`;
  }).join("");
}
function cardHTML(t, isAdmin){
  const v = vMap[t.venture]; const p = personById(t.assignee);
  const pr = PRIO[t.priority]; const over = t.status!=="done" && isOverdue(t.due);
  const back = PREV_STATUS[t.status], fwd = NEXT_STATUS[t.status];
  const subs = t.subtasks||[]; const subDone = subs.filter(s=>s.done).length;
  const subProg = subs.length
    ? `<div class="subprog">✓ ${subDone}/${subs.length}<span class="sp-bar"><span style="width:${Math.round(subDone/subs.length*100)}%"></span></span></div>`
    : "";
  // employee gets quick-move buttons; admin relies on drag + edit
  const moveBar = !isAdmin ? `
    <div class="movebar">
      ${back ? `<button class="movebtn" onclick="event.stopPropagation();moveTask('${t.id}','${back}')">← ${STATUS_LABEL[back]}</button>` : ``}
      ${fwd ? `<button class="movebtn ${fwd==='done'?'done':'go'}" onclick="event.stopPropagation();moveTask('${t.id}','${fwd}')">${fwd==='done'?'Mark done ✓':STATUS_LABEL[fwd]+' →'}</button>` : ``}
    </div>` : ``;
  const whoLine = isAdmin
    ? `${p ? `<span class="avatar" style="background:${avatarColor(p.id)}">${initials(p.name)}</span><span class="nm">${esc(p.name)}</span>` : `<span class="nm">Unassigned</span>`}
       ${t.due ? `<span class="due ${over?'over':''}">${over?'⚑ ':''}${fmtDue(t.due)}</span>` : ``}`
    : `<span class="nm">${STATUS_LABEL[t.status]}</span>
       ${t.due ? `<span class="due ${over?'over':''}">${over?'⚑ Due ':'Due '}${fmtDue(t.due)}</span>` : ``}`;
  return `
    <div class="card" draggable="true" data-id="${t.id}"
         ondragstart="onDragStart(event,'${t.id}')" ondragend="this.classList.remove('dragging')"
         ${isAdmin?`ondblclick="openTaskModal('${t.id}')"`:''}>
      <span class="spine" style="background:${v.color}"></span>
      ${isAdmin?`<button class="del" title="Delete" onclick="event.stopPropagation();deleteTask('${t.id}')">×</button>`:''}
      <div class="ttl">${esc(t.title)}</div>
      ${t.notes?`<div class="note">${esc(t.notes)}</div>`:''}
      <div class="meta">
        <span class="vpill" style="background:${v.color}">${v.name}</span>
        <span class="prio"><span class="pdot" style="background:${pr.c}"></span>${pr.l}</span>
      </div>
      ${subProg}
      <div class="who">${whoLine}</div>
      ${moveBar}
    </div>`;
}
function moveTask(id, status){
  const t = state.tasks.find(x=>x.id===id);
  if (!t) return;
  if (role()==="employee" && t.assignee!==currentUser) return; // safety
  t.status = status; save(); renderAll();
}

/* ---------- Drag & drop ---------- */
let dragId = null;
function onDragStart(e, id){ dragId=id; e.dataTransfer.effectAllowed="move"; e.currentTarget.classList.add("dragging"); }
function onDragOver(e, col){ e.preventDefault(); col.classList.add("dragover"); }
function onDrop(e, status){
  e.preventDefault();
  document.querySelectorAll(".col").forEach(c=>c.classList.remove("dragover"));
  const t = state.tasks.find(x=>x.id===dragId);
  if (t && t.status!==status){
    if (role()==="employee" && t.assignee!==currentUser){ dragId=null; return; }
    t.status=status; save(); renderAll();
  }
  dragId=null;
}

/* ---------------- Team (admin only) ---------------- */
function renderTeam(){
  const grid = $("teamGrid");
  const people = visiblePeople();
  if (!people.length){ grid.innerHTML = emptyBlock("No one here yet","Add a team member to start assigning work."); return; }
  grid.innerHTML = people.map(p=>{
    const v = vMap[p.venture];
    const mine = state.tasks.filter(t=>t.assignee===p.id);
    const open = mine.filter(t=>t.status!=="done").length;
    const doing = mine.filter(t=>t.status==="doing").length;
    const loadPct = Math.min(100, open*20);
    const loadColor = open>=4 ? "var(--p-high)" : open>=2 ? "var(--p-med)" : "#2E9E78";
    return `
      <div class="person">
        <div class="phead">
          <span class="avatar av-lg" style="background:${avatarColor(p.id)}">${initials(p.name)}</span>
          <div><div class="pname">${esc(p.name)}</div><div class="prole">${esc(p.role)}</div></div>
        </div>
        <div class="pventure"><span class="dot" style="background:${v.color}"></span>${v.name}</div>
        <div class="loadwrap">
          <div class="lrow"><span>Active workload</span><span><b>${open}</b> open · ${doing} in progress</span></div>
          <div class="bar"><span style="width:${loadPct}%;background:${loadColor}"></span></div>
        </div>
        <div class="availrow">
          <div class="toggle">
            <button class="${p.avail==='avail'?'on av':''}" onclick="setAvail('${p.id}','avail')">Available</button>
            <button class="${p.avail==='busy'?'on bz':''}" onclick="setAvail('${p.id}','busy')">Busy</button>
            <button class="${p.avail==='off'?'on of':''}" onclick="setAvail('${p.id}','off')">Off</button>
          </div>
        </div>
        <div class="pactions">
          <button class="pbtn" onclick="openPersonModal('${p.id}')">Edit</button>
          <button class="pbtn danger" onclick="deletePerson('${p.id}')">Remove</button>
        </div>
      </div>`;
  }).join("");
}
function setAvail(id, v){ const p=personById(id); if(p){ p.avail=v; save(); renderTeam(); } }

/* ---------------- Roster ---------------- */
const SHIFT_CYCLE = { work:"off", off:"leave", leave:"work" };
const SHIFT_LABEL = { work:"Work", off:"Off", leave:"Leave" };
function renderRoster(){
  const isAdmin = role()==="admin";
  const people = visiblePeople();
  const todayIdx = (new Date().getDay()+6)%7;
  const head = `<thead><tr><th>Member</th>${DAYS.map((d,di)=>`<th class="${di===todayIdx?'today':''}">${d}</th>`).join("")}</tr></thead>`;
  const body = `<tbody>${people.map(p=>{
    const sch = state.schedule[p.id] || DAYS.map(()=> "work");
    return `<tr>
      <td class="pcell"><div class="pc-in">
        <span class="avatar" style="background:${avatarColor(p.id)}">${initials(p.name)}</span>
        <div><div class="nm">${esc(p.name)}</div><div class="rl">${esc(p.role)}</div></div>
      </div></td>
      ${sch.map((s,di)=>`<td class="${di===todayIdx?'today':''}"><button class="shift ${s} ${isAdmin?'':'ro'}" ${isAdmin?`onclick="cycleShift('${p.id}',${di})"`:''}>${SHIFT_LABEL[s]}</button></td>`).join("")}
    </tr>`;
  }).join("")}</tbody>`;
  $("rosterTable").innerHTML = head + (people.length? body : `<tbody><tr><td colspan="8">${emptyBlock("No team to schedule","Add people in the Team tab first.")}</td></tr></tbody>`);
}
function cycleShift(pid, di){
  if (role()!=="admin") return;
  if(!state.schedule[pid]) state.schedule[pid] = DAYS.map(()=> "work");
  state.schedule[pid][di] = SHIFT_CYCLE[state.schedule[pid][di] || "work"];
  save(); renderRoster();
}

/* ---------------- Subtasks editor ---------------- */
function subRowHTML(text, done){
  return `<div class="subrow">
    <input type="checkbox" ${done?"checked":""} />
    <input type="text" value="${esc(text)}" placeholder="Checklist item" />
    <button type="button" class="sub-del" title="Remove" onclick="this.closest('.subrow').remove()">×</button>
  </div>`;
}
function renderSubtasks(list){ $("tk_subwrap").innerHTML = (list||[]).map(s=>subRowHTML(s.text, s.done)).join(""); }
function addSubtaskRow(text="", done=false){
  $("tk_subwrap").insertAdjacentHTML("beforeend", subRowHTML(text, done));
  if (!text){ const rows=$("tk_subwrap").querySelectorAll(".subrow"); rows[rows.length-1].querySelector('input[type="text"]').focus(); }
}
function readSubtasks(){
  return Array.from($("tk_subwrap").querySelectorAll(".subrow")).map(r=>({
    text: r.querySelector('input[type="text"]').value.trim(),
    done: r.querySelector('input[type="checkbox"]').checked,
  })).filter(s=>s.text);
}

/* ---------------- Modals (admin) ---------------- */
function fillVentureSelect(sel){ sel.innerHTML = VENTURES.map(v=>`<option value="${v.id}">${v.name}</option>`).join(""); }
function fillAssigneeSelect(sel, ventureId){
  const people = state.employees.filter(p => !ventureId || p.venture===ventureId);
  const vName = ventureId ? (vMap[ventureId]?.name || "this venture") : "any venture";
  sel.innerHTML = `<option value="">Unassigned</option>` +
    (people.length
      ? people.map(p=>`<option value="${p.id}">${esc(p.name)} — ${esc(p.role)}</option>`).join("")
      : `<option value="" disabled>No one in ${esc(vName)} yet — add them in Team</option>`);
}
function onTaskVentureChange(){
  fillAssigneeSelect($("tk_assignee"), $("tk_venture").value);
}
function openTaskModal(id){
  if (role()!=="admin") return;
  editingTaskId = id || null;
  fillVentureSelect($("tk_venture"));
  $("taskModalTitle").textContent = id ? "Edit work" : "Assign work";
  if (id){
    const t = state.tasks.find(x=>x.id===id);
    $("tk_venture").value = t.venture;
    fillAssigneeSelect($("tk_assignee"), t.venture);
    $("tk_title").value=t.title; $("tk_assignee").value=t.assignee||"";
    $("tk_priority").value=t.priority; $("tk_due").value=t.due||""; $("tk_status").value=t.status;
    $("tk_notes").value=t.notes||"";
    renderSubtasks(t.subtasks);
  } else {
    const ven = filter!=="all" ? filter : VENTURES[0].id;
    $("tk_venture").value = ven;
    fillAssigneeSelect($("tk_assignee"), ven);
    $("tk_title").value=""; $("tk_assignee").value="";
    $("tk_priority").value="med"; $("tk_due").value=""; $("tk_status").value="todo";
    $("tk_notes").value="";
    renderSubtasks([]);
  }
  $("taskOverlay").classList.remove("hidden");
  setTimeout(()=>$("tk_title").focus(), 30);
}
function saveTask(){
  const title = $("tk_title").value.trim();
  if(!title){ $("tk_title").focus(); return; }
  const data = { title, assignee:$("tk_assignee").value, venture:$("tk_venture").value,
    priority:$("tk_priority").value, due:$("tk_due").value, status:$("tk_status").value,
    notes:$("tk_notes").value.trim(), subtasks:readSubtasks() };
  const editing = !!editingTaskId;
  if (editing){ Object.assign(state.tasks.find(t=>t.id===editingTaskId), data); }
  else { state.tasks.unshift({ id:uid("t"), ...data }); }
  save(); closeModal("taskOverlay"); renderAll();
  toast(editing ? "Task updated" : "Task created");
}
function deleteTask(id){
  const idx = state.tasks.findIndex(t=>t.id===id);
  if (idx<0) return;
  const removed = state.tasks[idx];
  state.tasks.splice(idx,1); save(); renderAll();
  const short = removed.title.length>40 ? removed.title.slice(0,40)+"…" : removed.title;
  toast(`Deleted “${short}”`, { actionLabel:"Undo", onAction:()=>{
    state.tasks.splice(Math.min(idx, state.tasks.length), 0, removed); save(); renderAll(); toast("Task restored");
  }});
}

function openPersonModal(id){
  editingPersonId = id || null;
  fillVentureSelect($("ps_venture"));
  $("personModalTitle").textContent = id ? "Edit person" : "Add person";
  $("personSaveBtn").textContent = id ? "Save" : "Add";
  if (id){
    const p = personById(id);
    $("ps_name").value=p.name; $("ps_role").value=p.role; $("ps_venture").value=p.venture;
  } else {
    $("ps_name").value=""; $("ps_role").value="";
    $("ps_venture").value = filter!=="all"?filter:VENTURES[0].id;
  }
  $("personOverlay").classList.remove("hidden");
  setTimeout(()=>$("ps_name").focus(), 30);
}
function savePerson(){
  const name=$("ps_name").value.trim(); const role2=$("ps_role").value.trim()||"Team member";
  const ven=$("ps_venture").value;
  if(!name){ $("ps_name").focus(); return; }
  if (editingPersonId){
    const p = personById(editingPersonId);
    if (p.venture!==ven){
      const mismatch = state.tasks.filter(t=>t.assignee===p.id && t.venture!==ven);
      if (mismatch.length && !confirm(`${p.name} is moving to ${vMap[ven].name}. Their ${mismatch.length} task(s) from another venture will be unassigned, since a person only handles their own venture's work. Continue?`)) return;
      mismatch.forEach(t=> t.assignee="");
    }
    p.name=name; p.role=role2; p.venture=ven;
  } else {
    const id = uid("e");
    state.employees.push({ id, name, role:role2, venture:ven, avail:"avail" });
    state.schedule[id] = DAYS.map((_,di)=> di===6?"off":"work");
  }
  save(); closeModal("personOverlay"); renderAll();
}
function deletePerson(id){
  const p = personById(id);
  const n = state.tasks.filter(t=>t.assignee===id).length;
  if(!confirm(`Remove ${p.name}?` + (n?` Their ${n} task(s) will become unassigned.`:""))) return;
  state.employees = state.employees.filter(e=>e.id!==id);
  state.tasks.forEach(t=>{ if(t.assignee===id) t.assignee=""; });
  delete state.schedule[id];
  if (currentUser===id) currentUser="admin";
  save(); renderAll();
}
function closeModal(id){ $(id).classList.add("hidden"); }

/* ---------------- Render orchestration ---------------- */
function renderAll(){
  renderIdentity(); renderFilter(); renderTabs(); renderChrome();
  renderStats(); renderBoardTools(); renderBoard(); renderTeam(); renderRoster();
}

document.querySelectorAll(".overlay").forEach(o=> o.addEventListener("click", e=>{ if(e.target===o) o.classList.add("hidden"); }));
document.addEventListener("keydown", e=>{ if(e.key==="Escape") document.querySelectorAll(".overlay").forEach(o=>o.classList.add("hidden")); });

(async function init(){
  try { theme = localStorage.getItem("roster:theme") || "light"; } catch (_) {}
  applyTheme();
  await load(); renderAll();
})();
</script>
</body>
